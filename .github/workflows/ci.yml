name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Run ESLint
        working-directory: backend
        run: npx eslint .

      - name: Build Docker Containers
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 10

      - name: Health Check
        run: curl --fail http://localhost:3001/api/orders