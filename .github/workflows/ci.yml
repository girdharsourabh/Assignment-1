name: CI Pipeline

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Run backend linting
        working-directory: ./backend
        run: npm run lint

  health-check:
    name: Health Check Test
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Build and start containers
        run: docker-compose up -d --build
      
      - name: Wait for services to be ready
        run: |
          echo "Waiting for backend to be ready..."
          timeout 60 bash -c 'until curl -f http://localhost:3001/api/health; do sleep 2; done'
          echo "Backend is ready!"
      
      - name: Run health check test
        run: |
          echo "Testing backend health endpoint..."
          response=$(curl -s http://localhost:3001/api/health)
          echo "Response: $response"
          
          if echo "$response" | grep -q '"status":"ok"'; then
            echo "✓ Health check passed!"
          else
            echo "✗ Health check failed!"
            exit 1
          fi
      
      - name: Test database connectivity
        run: |
          echo "Testing orders endpoint (database connectivity)..."
          status_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/orders)
          
          if [ "$status_code" -eq 200 ]; then
            echo "✓ Database connectivity test passed!"
          else
            echo "✗ Database connectivity test failed with status code: $status_code"
            exit 1
          fi
      
      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker-compose logs backend
          echo "=== Database logs ==="
          docker-compose logs db
      
      - name: Stop containers
        if: always()
        run: docker-compose down -v
