name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run ESLint
        run: npm run lint
        working-directory: backend

  health-check:
    name: Health Check (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start containers
        run: docker compose up --build -d

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health; then
              echo "Backend is up!"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 3s..."
            sleep 3
          done
          echo "Backend did not become healthy in time"
          docker compose logs backend
          exit 1

      - name: Verify health endpoint response
        run: |
          RESPONSE=$(curl -s http://localhost:3001/api/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' || (echo "Unexpected health response" && exit 1)

      - name: Verify orders endpoint is reachable
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:3001/api/orders)
          echo "GET /api/orders returned HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "Expected 200, got $STATUS" && exit 1)

      - name: Stop containers
        if: always()
        run: docker compose down
