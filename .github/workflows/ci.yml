name: CI

on:
  pull_request:
    branches:
        - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Run backend lint
        working-directory: backend
        run: npm run lint

  health-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t order-backend ./backend
      - name: Run backend container
        run: |
          docker run -d --name order-backend -p 3001:3001 order-backend
          echo "waiting for backend to start..."
          for i in {1..15}; do
            if curl -sS http://localhost:3001/api/health | grep -q '"status":"ok"'; then
              echo 'health check passed';
              exit 0;
            fi
            sleep 2;
          done
          echo 'health check failed';
          docker logs order-backend || true;
          exit 1
      - name: Stop backend container
        if: always()
        run: |
          docker stop order-backend || true
          docker rm order-backend || true
