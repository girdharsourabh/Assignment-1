name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Run ESLint
        working-directory: ./backend
        run: npm run lint

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up -d --build

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/api/health | grep -q '"status":"ok"'; then
              echo "Backend is up"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to start"
          docker compose logs backend
          exit 1

      - name: Check health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
          if [ "$response" != "200" ]; then
            echo "Health check failed with status $response"
            exit 1
          fi
          echo "Health check passed (200 OK)"

      - name: Check orders endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/orders)
          if [ "$response" != "200" ]; then
            echo "Orders endpoint failed with status $response"
            docker compose logs backend
            exit 1
          fi
          echo "Orders endpoint passed (200 OK)"

      - name: Tear down
        if: always()
        run: docker compose down -v
