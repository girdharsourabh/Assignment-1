name: CI

on:
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run ESLint
        working-directory: ./backend
        run: npx eslint src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Start services
        run: docker compose up -d --build
      - name: Wait for services to be ready
        run: sleep 10
      - name: Healthcheck
        run: curl -f http://localhost:3001/api/health || exit 1
