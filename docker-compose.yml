version: '3.9'

services:

  db:
    image: postgres:15
    container_name: order-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: orderdb

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d orderdb"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build: ./backend
    container_name: order-backend
    restart: unless-stopped

    ports:
      - "3001:3001"

    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: orderdb

    depends_on:
      db:
        condition: service_healthy


  frontend:
    build: ./frontend
    container_name: order-frontend
    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      - backend


volumes:
  pgdata: