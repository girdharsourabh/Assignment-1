version: '3'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: orderdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d orderdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: orderdb
      PGUSER: admin
      PGPASSWORD: admin123
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1));" ]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
