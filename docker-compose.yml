version: '3.8'

services:
  db:
    # FIX: Pin exact image version (was postgres:15 — unpinned, changes silently)
    image: postgres:15.6
    restart: unless-stopped
    # FIX: Read credentials from .env file instead of hardcoding them inline
    env_file: .env
    # FIX: Remove host port exposure — db should not be reachable from outside
    # the Docker network in production. Backend reaches it via the internal
    # 'db' hostname on port 5432.
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    # FIX: Healthcheck — backend used to crash on startup because postgres
    # wasn't ready yet even though the container had started.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      PORT: 3001
    # FIX: Wait for the healthcheck to pass, not just for the container to start
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
